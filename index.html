<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Schichtplan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;}
.app{max-width:960px;margin:0 auto;padding:.75rem;}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;background:#fff;border-radius:12px;padding:10px 14px;border:1px solid #e5e5e0;flex-wrap:wrap;}
.toolbar h1{font-size:16px;font-weight:600;flex:1;min-width:80px;}
.lang-btns{display:flex;gap:3px;}
.lang-btn{padding:3px 8px;border:1px solid #ddd;border-radius:20px;font-size:11px;background:#fff;color:#666;cursor:pointer;font-family:inherit;}
.lang-btn.active{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:500;}
.btn{padding:6px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn:hover{background:#f5f5f0;}
.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5;}
.btn.primary:hover{background:#0C447C;}
.lock-btn{padding:5px 11px;border:1px solid #ddd;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.lock-btn.locked{background:#fff;color:#666;}
.lock-btn.unlocked{background:#0F6E56;color:#fff;border-color:#0F6E56;}
.tab-row{display:flex;gap:0;margin-bottom:0;background:#fff;border-radius:12px 12px 0 0;padding:0 10px;border:1px solid #e5e5e0;border-bottom:none;overflow-x:auto;}
.tab{padding:10px 12px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.tab.active{color:#1a1a1a;border-bottom-color:#185FA5;font-weight:500;}
.panel{background:#fff;border-radius:0 0 12px 12px;padding:.9rem;border:1px solid #e5e5e0;border-top:none;}
/* Mobile-friendly nav row */
.nav-row{display:flex;align-items:center;gap:6px;margin-bottom:1rem;flex-wrap:nowrap;}
.nav-row .btn{padding:6px 10px;font-size:16px;}
.week-label{font-size:12px;font-weight:500;text-align:center;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.saving{font-size:11px;color:#888;white-space:nowrap;}
.grid-wrap{border:1px solid #e5e5e0;border-radius:10px;overflow:auto;-webkit-overflow-scrolling:touch;}
.grid-wrap table{width:100%;border-collapse:separate;border-spacing:0;table-layout:fixed;min-width:600px;}
.grid-wrap th{font-size:9px;font-weight:500;color:#888;padding:6px 2px;text-align:center;border-bottom:1px solid #e5e5e0;background:#f9f9f7;}
.grid-wrap th:first-child{text-align:left;padding-left:8px;width:84px;position:sticky;left:0;z-index:2;background:#f9f9f7;box-shadow:2px 0 4px rgba(0,0,0,0.06);}
.grid-wrap td{padding:5px 2px;text-align:center;border-bottom:1px solid #f0f0ec;}
.grid-wrap td:first-child{text-align:left;padding-left:8px;font-size:12px;font-weight:500;position:sticky;left:0;z-index:1;background:#fff;box-shadow:2px 0 4px rgba(0,0,0,0.06);}
.grid-wrap tr:hover td:first-child{background:#f9f9f7;}
.grid-wrap tr:last-child td{border-bottom:none;}
/* Shift badges — bigger for mobile readability */
.sb{display:inline-block;padding:3px 7px;border-radius:20px;font-size:11px;font-weight:500;min-width:40px;white-space:nowrap;}
.sb.clickable{cursor:pointer;}
.sb.clickable:hover{opacity:.8;}
.sb-F{background:#dbeafe;color:#1e40af;}
.sb-S{background:#fef3c7;color:#92400e;}
.sb-N{background:#ede9fe;color:#4c1d95;}
.sb-O{background:#f0fdf4;color:#166534;}
.sb-K{background:#fee2e2;color:#991b1b;}
.sb-U{background:#dcfce7;color:#14532d;}
.today-col{background:#eff6ff;}
/* Team tab hidden in read-only mode */
#tab-team-btn.admin-only{display:none;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;padding:1rem;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:1.25rem;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.2);max-height:92vh;overflow-y:auto;}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1rem;}
.shift-opts{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1rem;}
.sopt{padding:6px 14px;border-radius:20px;border:1.5px solid #e5e5e0;font-size:13px;cursor:pointer;font-family:inherit;background:#fff;}
.sopt:hover{border-color:#aaa;}
.sopt.active{border-color:#185FA5;background:#dbeafe;color:#1e40af;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(78px,1fr));gap:7px;margin-bottom:1.25rem;}
.sc{background:#f9f9f7;border-radius:8px;padding:.65rem;border:1px solid #e5e5e0;}
.sc .lbl{font-size:10px;color:#888;margin-bottom:3px;}
.sc .val{font-size:20px;font-weight:600;}
.slabel{font-size:11px;color:#888;font-weight:500;margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em;}
.worker-list{border:1px solid #e5e5e0;border-radius:10px;overflow:hidden;}
.wrow{display:flex;align-items:center;gap:7px;padding:8px 10px;border-bottom:1px solid #f0f0ec;flex-wrap:wrap;}
.wrow:last-child{border-bottom:none;}
.wrow input[type=text]{border:1px solid #ddd;border-radius:7px;padding:4px 8px;font-family:inherit;font-size:13px;background:#fff;width:110px;min-width:0;}
.wdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.rmb{color:#bbb;background:none;border:none;cursor:pointer;font-size:18px;line-height:1;margin-left:auto;}
.rmb:hover{color:#e24b4a;}
.addrow{padding:8px 10px;font-size:13px;color:#888;cursor:pointer;display:flex;align-items:center;gap:6px;border-top:1px solid #e5e5e0;}
.addrow:hover{background:#f9f9f7;}
.note{font-size:12px;color:#aaa;margin-top:7px;}
.inactive-lbl{font-size:10px;background:#fee2e2;color:#991b1b;padding:2px 6px;border-radius:20px;margin-left:4px;font-weight:400;}
.pw-box{display:flex;gap:8px;align-items:center;}
.pw-box input{border:1px solid #ddd;border-radius:7px;padding:6px 10px;font-family:inherit;font-size:14px;flex:1;}
.pw-error{font-size:12px;color:#e24b4a;margin-top:6px;}
/* Pattern editor */
.pe-wrap{border:1px solid #e5e5e0;border-radius:10px;overflow:auto;margin-top:8px;-webkit-overflow-scrolling:touch;}
.pe-wrap table{border-collapse:collapse;min-width:480px;}
.pe-wrap th{font-size:9px;font-weight:500;color:#888;padding:6px 4px;text-align:center;background:#f9f9f7;border-bottom:1px solid #e5e5e0;white-space:nowrap;}
.pe-wrap th:first-child{text-align:left;padding-left:10px;min-width:76px;}
.pe-wrap td{padding:5px 4px;text-align:center;border-bottom:1px solid #f0f0ec;}
.pe-wrap td:first-child{text-align:left;padding-left:10px;font-size:12px;font-weight:500;white-space:nowrap;}
.pe-wrap tr:last-child td{border-bottom:none;}
.pe-cell{display:inline-flex;align-items:center;justify-content:center;width:38px;height:26px;border-radius:6px;font-size:10px;font-weight:600;border:1.5px solid transparent;transition:transform .1s;}
.pe-cell.editable{cursor:pointer;}
.pe-cell.editable:hover{transform:scale(1.1);box-shadow:0 2px 8px rgba(0,0,0,0.13);}
.pe-cell-F{background:#dbeafe;color:#1e40af;}
.pe-cell-S{background:#fef3c7;color:#92400e;}
.pe-cell-N{background:#ede9fe;color:#4c1d95;}
.pe-cell-O{background:#f0fdf4;color:#166534;}
.pe-repeat{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#fafaf8;border-top:1px dashed #e5e5e0;}
.pe-repeat-arrow{font-size:13px;color:#bbb;}
.pe-repeat-label{font-size:10px;color:#aaa;}
.pattern-note{font-size:11px;color:#aaa;margin-top:5px;}
/* Copy select */
.copy-select{width:100%;border:1px solid #ddd;border-radius:7px;padding:6px 9px;font-family:inherit;font-size:13px;margin-bottom:.75rem;background:#fff;}
.divider{border:none;border-top:1px solid #f0f0ec;margin:.75rem 0;}
@media(max-width:520px){
  .toolbar h1{font-size:14px;}
  .tab{padding:9px 9px;font-size:12px;}
  .grid-wrap table{min-width:500px;}
  .grid-wrap th:first-child{width:72px;}
  .grid-wrap td:first-child{font-size:11px;}
  .sb{font-size:11px;padding:3px 6px;min-width:38px;}
  .week-label{font-size:11px;}
}
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <h1 id="app-title">Schichtplan</h1>
    <div class="lang-btns">
      <button class="lang-btn active" onclick="setLang('de')">DE</button>
      <button class="lang-btn" onclick="setLang('pl')">PL</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('ua')">UA</button>
    </div>
    <button class="lock-btn locked" id="lock-btn" onclick="toggleLock()">
      <span id="lock-icon">🔒</span><span id="lock-label">Anmelden</span>
    </button>
    <button class="btn" onclick="exportCSV()" id="btn-export">CSV</button>
  </div>

  <div class="tab-row">
    <button class="tab active" onclick="switchTab('plan')" id="tab-plan-btn">Wochenplan</button>
    <button class="tab" onclick="switchTab('stats')" id="tab-stats-btn">Statistik</button>
    <button class="tab admin-only" onclick="switchTab('team')" id="tab-team-btn">Team</button>
  </div>

  <div class="panel">
    <div id="tab-plan">
      <div class="nav-row">
        <button class="btn" onclick="changeWeek(-1)">&#8592;</button>
        <span class="week-label" id="week-label"></span>
        <button class="btn" onclick="changeWeek(1)">&#8594;</button>
        <button class="btn" onclick="goToday()" id="btn-today">Heute</button>
        <span class="saving" id="saving-indicator"></span>
      </div>
      <div class="grid-wrap"><table id="plan-table"></table></div>
      <p class="note" id="note-click"></p>
    </div>

    <div id="tab-stats" style="display:none;">
      <div class="slabel" id="lbl-month"></div>
      <div class="stats" id="stats-grid"></div>
      <div class="slabel" id="lbl-per-worker"></div>
      <div class="grid-wrap" style="margin-top:8px;"><table id="stats-table"></table></div>
    </div>

    <div id="tab-team" style="display:none;">
      <div class="slabel" id="lbl-workers"></div>
      <div class="worker-list" id="worker-list"></div>
      <div style="margin-top:1.4rem;display:flex;align-items:baseline;justify-content:space-between;gap:6px;flex-wrap:wrap;">
        <div class="slabel" id="lbl-pattern" style="margin-bottom:0;"></div>
      </div>
      <p class="pattern-note" id="lbl-pattern-help" style="margin-top:4px;margin-bottom:8px;"></p>
      <div id="pattern-editor"></div>
    </div>
  </div>
</div>

<!-- Edit shift modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div class="shift-opts" id="modal-opts"></div>
    <hr class="divider"/>
    <div class="slabel" id="lbl-copy-from" style="margin-bottom:6px;"></div>
    <select class="copy-select" id="copy-from-select"></select>
    <button class="btn" style="width:100%;margin-bottom:.75rem;" onclick="copyFromWorker()" id="btn-copy-from"></button>
    <hr class="divider" style="margin-top:0;"/>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn" onclick="closeModal()" id="btn-cancel">Abbrechen</button>
      <button class="btn primary" onclick="saveShift()" id="btn-save">Speichern</button>
    </div>
  </div>
</div>

<!-- Password modal -->
<div class="modal-bg" id="pw-modal">
  <div class="modal">
    <h3 id="pw-title">Passwort eingeben</h3>
    <div class="pw-box">
      <input type="password" id="pw-input" placeholder="Code..." onkeydown="if(event.key==='Enter')checkPw()"/>
      <button class="btn primary" onclick="checkPw()">OK</button>
    </div>
    <div class="pw-error" id="pw-error"></div>
    <div style="margin-top:12px;text-align:right;">
      <button class="btn" onclick="closePwModal()" id="pw-cancel-btn">Abbrechen</button>
    </div>
  </div>
</div>

<!-- Copy whole schedule modal -->
<div class="modal-bg" id="copy-modal">
  <div class="modal">
    <h3 id="copy-modal-title"></h3>
    <div class="slabel" id="lbl-copy-src" style="margin-bottom:6px;"></div>
    <select class="copy-select" id="copy-src-select"></select>
    <div class="slabel" id="lbl-copy-dst" style="margin-bottom:6px;"></div>
    <select class="copy-select" id="copy-dst-select"></select>
    <p style="font-size:12px;color:#888;margin-bottom:1rem;" id="copy-modal-note"></p>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn" onclick="closeCopyModal()" id="copy-cancel-btn">Abbrechen</button>
      <button class="btn primary" onclick="doCopySchedule()" id="btn-do-copy">Kopieren</button>
    </div>
  </div>
</div>

let overrides = {};

function getToday(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
let currentWeekStart = getMonday(getToday());

// ── Firebase ──────────────────────────────────────────────────────────────────
const docRef = doc(db, 'schedule', 'main');

async function loadFromFirebase(){
  try {
    const snap = await getDoc(docRef);
    if(snap.exists()){
      const data = snap.data();
      if(data.overrides) overrides = data.overrides;
      if(data.workers) workers = data.workers.map(w=>({...w, cycle: w.cycle||[...DEFAULT_CYCLE]}));
    }
  } catch(e){ console.warn('Load error',e); }
  renderAll();
}

async function saveToFirebase(){
  const ind = document.getElementById('saving-indicator');
  if(ind) ind.textContent = '💾…';
  try {
    await setDoc(docRef, {workers, overrides});
    if(ind) ind.textContent = '✓';
    setTimeout(()=>{ if(ind) ind.textContent=''; }, 2000);
  } catch(e){
    if(ind) ind.textContent = '⚠️';
    console.warn('Save error',e);
  }
}

onSnapshot(docRef, (snap)=>{
  if(snap.exists()){
    const data = snap.data();
    if(data.overrides) overrides = data.overrides;
    if(data.workers) workers = data.workers.map(w=>({...w, cycle: w.cycle||[...DEFAULT_CYCLE]}));
    renderAll();
  }
});

// ── Shift logic ───────────────────────────────────────────────────────────────
function daysDiff(a,b){
  const da=new Date(a); da.setHours(0,0,0,0);
  const db=new Date(b); db.setHours(0,0,0,0);
  return Math.round((da-db)/86400000);
}

function getShift(wi, date){
  const key = wkey(wi, date);
  if(overrides[key]) return overrides[key];
  const w = workers[wi];
  if(!w.active) return 'K';
  const cycle = w.cycle||DEFAULT_CYCLE;
  const delta = daysDiff(date, ANCHOR);
  const pos = ((w.cyclePos + delta) % cycle.length + cycle.length) % cycle.length;
  return cycle[pos];
}

function wkey(wi,d){
  const dt=new Date(d);
  return `${wi}_${dt.getFullYear()}_${dt.getMonth()}_${dt.getDate()}`;
}
function getMonday(d){
  const dt=new Date(d); dt.setHours(0,0,0,0);
  const day=dt.getDay();
  dt.setDate(dt.getDate()+(day===0?-6:1-day));
  return dt;
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtDate(d){ return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}); }
function t(){ return I18N[lang]; }

// ── Language ──────────────────────────────────────────────────────────────────
window.setLang = function(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach((b,i)=>b.classList.toggle('active',['de','pl','en','ua'][i]===l));
  applyI18N(); renderAll();
};

  document.getElementById('btn-export').textContent=T.export;
  document.getElementById('btn-today').textContent=T.today;

  document.getElementById('btn-save').textContent=T.save;
  document.getElementById('tab-plan-btn').textContent=T.tabPlan;

  document.getElementById('lbl-copy-from').textContent=T.lblCopyFrom;
  document.getElementById('btn-copy-from').textContent=T.btnCopyFrom;
  document.getElementById('copy-cancel-btn').textContent=T.cancel;
}

// ── Auth ──────────────────────────────────────────────────────────────────────
function updateTeamTabVisibility(){
  const btn = document.getElementById('tab-team-btn');
  if(isAdmin){
    btn.classList.remove('admin-only');
  } else {
    btn.classList.add('admin-only');
    // If currently on team tab, switch to plan
    if(activeTab==='team') switchTab('plan');
  }
}

window.toggleLock = function(){
  if(isAdmin){
    isAdmin=false;
    document.getElementById('lock-btn').className='lock-btn locked';
    document.getElementById('lock-icon').textContent='🔒';
    document.getElementById('lock-label').textContent=t().login;
    updateTeamTabVisibility();
    renderAll();
  } else {
    document.getElementById('pw-modal').classList.add('open');
    document.getElementById('pw-input').value='';
    document.getElementById('pw-error').textContent='';
    setTimeout(()=>document.getElementById('pw-input').focus(),100);
  }
};
window.checkPw = function(){
  if(document.getElementById('pw-input').value===PASSWORD){
    isAdmin=true;
    document.getElementById('lock-btn').className='lock-btn unlocked';
    document.getElementById('lock-icon').textContent='✏️';
    document.getElementById('lock-label').textContent=t().logout;
    updateTeamTabVisibility();
    closePwModal(); renderAll();
  } else {
    document.getElementById('pw-error').textContent=t().pwError;
  }
};
window.closePwModal = function(){ document.getElementById('pw-modal').classList.remove('open'); };

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll(){
  if(activeTab==='plan') renderPlan();
  else if(activeTab==='stats') renderStats();
  else renderTeam();
}

function renderPlan(){
  const today=getToday();
  const days=Array.from({length:14},(_,i)=>addDays(currentWeekStart,i));
  const T=t();
  document.getElementById('week-label').textContent=fmtDate(days[0])+' – '+fmtDate(days[13]);
  const header=`<tr><th>${T.statCols[0]}</th>${days.map(d=>{
    const isT=d.getTime()===today.getTime();
    const di=d.getDay()===0?6:d.getDay()-1;
    return `<th class="${isT?'today-col':''}">${T.days[di]}<br>${fmtDate(d)}</th>`;
  }).join('')}</tr>`;
  const rows=workers.map((w,wi)=>{
    const color=COLORS[wi%COLORS.length];
    const dot=`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${color};margin-right:4px;"></span>`;
    const badge=!w.active?`<span class="inactive-lbl">${T.inactive}</span>`:'';
    const cells=days.map(d=>{
      const isT=d.getTime()===today.getTime();
      const s=getShift(wi,d);
      const cl=isAdmin?'clickable':'';
      const oc=isAdmin?`onclick="openModal(${wi},${d.getTime()})"` :'';
      return `<td class="${isT?'today-col':''}"><span class="sb sb-${s} ${cl}" ${oc}>${T.shiftNames[s]}</span></td>`;
    }).join('');
    return `<tr><td>${dot}${w.name}${badge}</td>${cells}</tr>`;
  }).join('');
  document.getElementById('plan-table').innerHTML=header+rows;
  document.getElementById('note-click').textContent=isAdmin?T.noteClick:T.noteReadonly;
}

function renderStats(){
  const T=t();
  document.getElementById('lbl-month').textContent=T.lblMonth;
  document.getElementById('lbl-per-worker').textContent=T.lblPerWorker;
  const today=getToday();
  const days30=Array.from({length:30},(_,i)=>addDays(today,i));
  const sundays=days30.filter(d=>d.getDay()===0); // getDay()==0 is Sunday
  const totals={F:0,S:0,N:0,O:0,K:0,U:0};
  workers.forEach((_,wi)=>days30.forEach(d=>{ const s=getShift(wi,d); totals[s]=(totals[s]||0)+1; }));
  // Total sunday work shifts across all workers
  let totalSunWork=0;
  workers.forEach((_,wi)=>sundays.forEach(d=>{ const s=getShift(wi,d); if(s==='F'||s==='S'||s==='N') totalSunWork++; }));
  document.getElementById('stats-grid').innerHTML=`
    <div class="sc"><div class="lbl">${T.statLabels.F}</div><div class="val" style="color:#1e40af;">${totals.F}</div></div>
    <div class="sc"><div class="lbl">${T.statLabels.S}</div><div class="val" style="color:#92400e;">${totals.S}</div></div>
    <div class="sc"><div class="lbl">${T.statLabels.N}</div><div class="val" style="color:#4c1d95;">${totals.N}</div></div>
    <div class="sc"><div class="lbl">${T.statLabels.K}</div><div class="val" style="color:#991b1b;">${totals.K||0}</div></div>
    <div class="sc"><div class="lbl">${T.statLabels.U}</div><div class="val" style="color:#14532d;">${totals.U||0}</div></div>
    <div class="sc"><div class="lbl">${T.statLabels.O}</div><div class="val" style="color:#555;">${totals.O}</div></div>
    <div class="sc"><div class="lbl">${T.statLabelSun}</div><div class="val" style="color:#b45309;">☀️ ${totalSunWork}</div></div>
  `;
  const cols=T.statCols;
  const thead=`<tr style="background:#f9f9f7;">${cols.map((c,i)=>{
    const isLast=i===cols.length-1;
    const sunStyle=isLast?'background:#fffbeb;color:#b45309;':'color:#888;';
    return `<th style="text-align:${i===0?'left':'center'};padding:7px ${i===0?'10px':'4px'};font-size:11px;${sunStyle}border-bottom:1px solid #e5e5e0;">${c}</th>`;
  }).join('')}</tr>`;
  const tbody=workers.map((w,wi)=>{
    const cnt={F:0,S:0,N:0,K:0,U:0,O:0,SUN:0};
    days30.forEach(d=>{ const s=getShift(wi,d); cnt[s]=(cnt[s]||0)+1; });
    sundays.forEach(d=>{ const s=getShift(wi,d); if(s==='F'||s==='S'||s==='N') cnt.SUN++; });
    const last=wi===workers.length-1;
    const bd=last?'':'border-bottom:1px solid #f0f0ec;';
    const sunCell=`<td style="text-align:center;font-size:13px;font-weight:600;color:#b45309;background:#fffbeb;${bd}">${cnt.SUN}</td>`;
    return `<tr><td style="text-align:left;padding:7px 10px;font-size:13px;font-weight:500;${bd}">${w.name}${!w.active?` <span style="font-size:10px;color:#991b1b;">(${T.inactive})</span>`:''}</td>${[cnt.F,cnt.S,cnt.N,cnt.K,cnt.U,cnt.O].map(v=>`<td style="text-align:center;font-size:13px;${bd}">${v}</td>`).join('')}${sunCell}</tr>`;
  }).join('');
  document.getElementById('stats-table').innerHTML=thead+tbody;
}

function renderTeam(){
  const T=t();
  document.getElementById('lbl-workers').textContent=T.lblWorkers;
  document.getElementById('lbl-pattern').textContent=T.lblPattern;
  document.getElementById('lbl-pattern-help').textContent=isAdmin?T.lblPatternHelp:'';

  const list=document.getElementById('worker-list');
  list.innerHTML=workers.map((w,wi)=>{
    const color=COLORS[wi%COLORS.length];
    return `<div class="wrow">
      <div class="wdot" style="background:${color};"></div>
      <input type="text" value="${w.name}" ${isAdmin?`onchange="updateWorkerName(${wi},this.value)"`:'readonly'} style="${isAdmin?'':'background:#f5f5f0;color:#888;'}" />
      ${isAdmin?`
        <label style="font-size:12px;color:#888;display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap;">
          <input type="checkbox" ${w.active?'checked':''} onchange="updateWorkerActive(${wi},this.checked)" style="width:auto;border:none;padding:0;"/> aktiv
        </label>
        <button class="btn" style="padding:3px 9px;font-size:11px;margin-left:auto;" onclick="openCopyModal(${wi})">📋 ${T.btnDoCopy}</button>
        <button class="rmb" onclick="removeWorker(${wi})" style="margin-left:4px;">×</button>`:''}
    </div>`;
  }).join('')+(isAdmin?`<div class="addrow" onclick="addWorker()">+ ${T.addWorker}</div>`:'');

  renderPatternEditor();
}

function renderPatternEditor(){
  const T=t();
  const editor=document.getElementById('pattern-editor');
  const today=getToday();

  // Show the next 8 days (= one full cycle) with real dates as column headers.
  // Each cell corresponds to a specific position in that worker's 8-day cycle.
  // Clicking a cell cycles through F→S→N→O and saves to Firebase.
  const dates8=Array.from({length:8},(_,i)=>addDays(today,i));

  const thead=`<tr>
    <th style="text-align:left;padding-left:10px;min-width:76px;">${T.statCols[0]}</th>
    ${dates8.map(d=>{
      const di=d.getDay()===0?6:d.getDay()-1;
      const isT=d.getTime()===today.getTime();
      return `<th style="${isT?'background:#eff6ff;':''}">${T.days[di]}<br><span style="font-weight:400;color:#aaa;">${fmtDate(d)}</span></th>`;
    }).join('')}
  </tr>`;

  const tbody=workers.map((w,wi)=>{
    const cycle=w.cycle||[...DEFAULT_CYCLE];
    const cells=dates8.map(d=>{
      const delta=daysDiff(d,ANCHOR);
      const pos=((w.cyclePos+delta)%cycle.length+cycle.length)%cycle.length;
      const s=cycle[pos];
      const isT=d.getTime()===today.getTime();
      const edCls=isAdmin?'editable':'';
      const oc=isAdmin?`onclick="patternCellClick(${wi},${pos})"` :'';
      return `<td style="${isT?'background:#eff6ff;':''}">
        <div class="pe-cell pe-cell-${s} ${edCls}" ${oc} title="${T.shiftNames[s]} — ${T.lblPattern||'Zyklus'} ${pos+1}/8">
          ${T.shiftNames[s].charAt(0)}
          <span style="font-size:7px;color:inherit;opacity:.5;display:block;line-height:1;">${pos+1}</span>
        </div>
      </td>`;
    }).join('');
    const last=wi===workers.length-1;
    return `<tr style="${last?'':'border-bottom:1px solid #f0f0ec;'}">
      <td>${w.name}${!w.active?`<span class="inactive-lbl">${T.inactive}</span>`:''}</td>
      ${cells}
    </tr>`;
  }).join('');

  // Full cycle mini-preview (all 8 positions numbered)
  const cyclePreview=workers.map(w=>{
    const cycle=w.cycle||DEFAULT_CYCLE;
    return `<div style="display:flex;align-items:center;gap:3px;margin-bottom:5px;">
      <span style="font-size:11px;color:#888;min-width:62px;flex-shrink:0;">${w.name}</span>
      ${cycle.map((s,i)=>`
        <div style="text-align:center;">
          <div class="pe-cell pe-cell-${s}" style="width:26px;height:20px;font-size:9px;border-radius:4px;">${s}</div>
          <div style="font-size:8px;color:#ccc;margin-top:1px;">${i+1}</div>
        </div>`).join('')}
      <span style="font-size:11px;color:#ccc;margin-left:2px;">↻</span>
    </div>`;
  }).join('');

  editor.innerHTML=`
    <div class="pe-wrap">
      <table style="width:100%;">${thead}<tbody>${tbody}</tbody></table>
      <div class="pe-repeat">
        <span class="pe-repeat-arrow">↻</span>
        <span class="pe-repeat-label">${T.lblPatternBadge}</span>
      </div>
    </div>
    <div style="margin-top:10px;padding:10px 12px;background:#f9f9f7;border-radius:8px;border:1px solid #e5e5e0;overflow-x:auto;">
      <div class="slabel" style="margin-bottom:8px;">${T.lblFullCycle}</div>
      ${cyclePreview}
    </div>
  `;
}

window.patternCellClick = async function(wi,pos){
  if(!isAdmin) return;
  const cycle=[...(workers[wi].cycle||DEFAULT_CYCLE)];
  const order=['F','S','N','O'];
  cycle[pos]=order[(order.indexOf(cycle[pos])+1)%order.length];
  workers[wi].cycle=cycle;
  renderPatternEditor();
  await saveToFirebase();
};

// ── Modal: single shift edit ──────────────────────────────────────────────────
window.openModal = function(wi,dateTs){
  if(!isAdmin) return;
  const d=new Date(dateTs);
  const s=getShift(wi,d);
  modalCtx={wi,date:d}; selectedShift=s;
  const T=t();
  const di=d.getDay()===0?6:d.getDay()-1;
  document.getElementById('modal-title').textContent=`${workers[wi].name} — ${T.days[di]}, ${fmtDate(d)}`;
  document.getElementById('btn-cancel').textContent=T.cancel;
  document.getElementById('btn-save').textContent=T.save;
  document.getElementById('lbl-copy-from').textContent=T.lblCopyFrom;
  document.getElementById('btn-copy-from').textContent=T.btnCopyFrom;
  document.getElementById('modal-opts').innerHTML=Object.entries(T.shiftNames).map(([k,v])=>
    `<button class="sopt ${k===s?'active':''}" onclick="selectShift('${k}')">${v}</button>`
  ).join('');
  const sel=document.getElementById('copy-from-select');
  sel.innerHTML=workers.map((w,i)=>i===wi?'':
    `<option value="${i}">${w.name} — ${T.shiftNames[getShift(i,d)]}</option>`
  ).join('');
  document.getElementById('modal').classList.add('open');
};

window.selectShift = function(k){
  selectedShift=k;
  const T=t();
  document.querySelectorAll('.sopt').forEach(el=>{
    const found=Object.entries(T.shiftNames).find(([,v])=>v===el.textContent.trim());
    el.classList.toggle('active',found&&found[0]===k);
  });
};

window.copyFromWorker = function(){
  if(!modalCtx) return;
  const src=parseInt(document.getElementById('copy-from-select').value);
  if(isNaN(src)) return;
  selectShift(getShift(src,modalCtx.date));
};

window.saveShift = async function(){
  if(!modalCtx||!selectedShift) return;
  overrides[wkey(modalCtx.wi,modalCtx.date)]=selectedShift;
  closeModal(); renderAll();
  await saveToFirebase();
};

window.closeModal = function(){
  document.getElementById('modal').classList.remove('open');
  modalCtx=null; selectedShift=null;
};

// ── Modal: copy whole schedule ────────────────────────────────────────────────
window.openCopyModal = function(targetWi){
  const T=t();
  document.getElementById('copy-modal-title').textContent=T.copyModalTitle;
  document.getElementById('lbl-copy-src').textContent=T.lblCopySrc;
  document.getElementById('lbl-copy-dst').textContent=T.lblCopyDst;
  document.getElementById('copy-modal-note').textContent=T.copyModalNote;
  document.getElementById('btn-do-copy').textContent=T.btnDoCopy;
  document.getElementById('copy-cancel-btn').textContent=T.cancel;
  const opts=workers.map((w,i)=>`<option value="${i}" ${i===targetWi?'selected':''}>${w.name}</option>`).join('');
  document.getElementById('copy-src-select').innerHTML=opts;
  document.getElementById('copy-dst-select').innerHTML=opts;
  // default: src = other worker, dst = targetWi
  document.getElementById('copy-src-select').value = targetWi===0?1:0;
  document.getElementById('copy-dst-select').value = targetWi;
  document.getElementById('copy-modal').classList.add('open');
};

window.closeCopyModal = function(){ document.getElementById('copy-modal').classList.remove('open'); };

window.doCopySchedule = async function(){
  const src=parseInt(document.getElementById('copy-src-select').value);
  const dst=parseInt(document.getElementById('copy-dst-select').value);
  if(src===dst){ closeCopyModal(); return; }
  workers[dst].cyclePos=workers[src].cyclePos;
  workers[dst].cycle=[...(workers[src].cycle||DEFAULT_CYCLE)];
  closeCopyModal(); renderAll();
  await saveToFirebase();
};

// ── Team CRUD ─────────────────────────────────────────────────────────────────
window.updateWorkerName = async function(wi,name){ workers[wi].name=name; renderAll(); await saveToFirebase(); };
window.updateWorkerActive = async function(wi,active){ workers[wi].active=active; renderAll(); await saveToFirebase(); };
window.addWorker = async function(){
  workers.push({name:'Neu',cyclePos:0,active:true,cycle:[...DEFAULT_CYCLE]});
  renderAll(); await saveToFirebase();
};
window.removeWorker = async function(wi){
  if(workers.length<=1) return;
  workers.splice(wi,1); renderAll(); await saveToFirebase();
};

// ── Navigation ────────────────────────────────────────────────────────────────
window.changeWeek = function(dir){ currentWeekStart=addDays(currentWeekStart,dir*14); renderPlan(); };
window.goToday = function(){ currentWeekStart=getMonday(getToday()); renderPlan(); };
window.switchTab = function(tab){
  activeTab=tab;
  ['plan','stats','team'].forEach(t=>{ document.getElementById('tab-'+t).style.display=t===tab?'':'none'; });
  ['plan-btn','stats-btn','team-btn'].forEach((id,i)=>{
    document.getElementById('tab-'+id).classList.toggle('active',['plan','stats','team'][i]===tab);
  });
  renderAll();
};
window.exportCSV = function(){
  const days=Array.from({length:14},(_,i)=>addDays(currentWeekStart,i));
  const T=t();
  const header=[T.statCols[0],...days.map(d=>fmtDate(d))].join(',');
  const rows=workers.map((w,wi)=>[w.name,...days.map(d=>T.shiftNames[getShift(wi,d)])].join(','));
  const blob=new Blob([[header,...rows].join('\n')],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='schichtplan.csv'; a.click();
};

// ── Init ──────────────────────────────────────────────────────────────────────
applyI18N();
updateTeamTabVisibility();
loadFromFirebase();
</script>
